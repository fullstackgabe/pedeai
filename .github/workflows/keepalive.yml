name: Supabase Keep-Alive

on:
  schedule:
    - cron: '30 7 */2 * *'
  workflow_dispatch:

env:
  SUPABASE_URL: https://klbscaztdubuekdwsecu.supabase.co
  SUPABASE_KEY: sb_publishable_b5x14wPgfrDQT-rIaMLhVA_MOL2VaGc

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/ingredientes?select=id&limit=1")
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
